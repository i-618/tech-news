<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech News Ticker</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCA2NCA2NCc+PHJlY3Qgd2lkdGg9JzY0JyBoZWlnaHQ9JzY0JyByeD0nMTInIGZpbGw9JyMwYTBhMGEnLz48cmVjdCB4PScxMCcgeT0nMTgnIHdpZHRoPSc0NCcgaGVpZ2h0PSczNCcgcng9JzYnIGZpbGw9JyNjNjI4MjgnLz48cmVjdCB4PScxMCcgeT0nMjgnIHdpZHRoPSc0NCcgaGVpZ2h0PSc0JyBmaWxsPScjOWUxZjFmJy8+PHJlY3QgeD0nMTAnIHk9JzM4JyB3aWR0aD0nNDQnIGhlaWdodD0nNCcgZmlsbD0nIzllMWYxZicvPjxwYXRoIGQ9J000NCwxOEM0OSwxMiw1MywxMiw1Niw4JyBzdHJva2U9JyNmNWM1NDInIHN0cm9rZS13aWR0aD0nMycgZmlsbD0nbm9uZScgc3Ryb2tlLWxpbmVjYXA9J3JvdW5kJy8+PGNpcmNsZSBjeD0nNTcnIGN5PSc4JyByPSczJyBmaWxsPScjZmZlYjNiJy8+PHRleHQgeD0nMzInIHk9JzQ2JyB0ZXh0LWFuY2hvcj0nbWlkZGxlJyBmb250LWZhbWlseT0nQXJpYWwsc2Fucy1zZXJpZicgZm9udC1zaXplPScxNCcgZm9udC13ZWlnaHQ9JzcwMCcgZmlsbD0nI2ZmZmZmZic+VE5UPC90ZXh0Pjwvc3ZnPg==">
  <script>
    // ═══════════════════════════════════════════════════════════
    // CONFIGURATION
    // ═══════════════════════════════════════════════════════════
    const SLIDE_DURATION = 15;        // Slide duration in seconds
    const MARGIN = 40;               // Margin around content in pixels
    const REFRESH_INTERVAL = 10;     // Data refresh interval in seconds
    const INDEX_HTML_CHECK_INTERVAL = 60; // Check index.html updates in seconds
    // ═══════════════════════════════════════════════════════════
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
    }

    .slide {
      width: 100vw;
      height: 100vh;
      display: none;
      position: relative;
    }

    .slide.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .content {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .content.text {
      line-height: 1.5;
      text-align: center;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }

    .content img {
      max-width: 100%;
      max-height: calc(100vh - 6rem);
      object-fit: contain;
    }

    .source {
      position: absolute;
      bottom: 1.5rem;
      left: 2rem;
      font-size: clamp(0.8rem, 1.2vw, 1.1rem);
      color: #f5f5f5;
      background: rgba(255, 255, 255, 0.15);
      padding: 0.4rem 1rem;
      border-radius: 50px;
      max-width: 40%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 700;
    }

    .timer {
      position: fixed;
      bottom: 1.5rem;
      right: 2rem;
      font-size: 1.2rem;
      color: #555;
      font-variant-numeric: tabular-nums;
    }

    .dots {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.6rem;
      z-index: 100;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #333;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot:hover {
      background: #555;
    }

    .dot.active {
      background: #f5f5f5;
      transform: scale(1.2);
    }

    .loading, .error {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 1.2rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="container"></div>
  <div class="dots" id="dots"></div>
  <div class="timer" id="timer"></div>

  <script>
    const container = document.getElementById('container');
    const dotsContainer = document.getElementById('dots');
    const timerDisplay = document.getElementById('timer');
    
    const STORAGE_KEY = 'slideshow_data';
    let slides = [];
    let currentIndex = 0;
    let countdown = SLIDE_DURATION;
    let intervalId = null;
    let isPaused = false;
    let indexHtmlSignature = null;

    async function fetchSlides() {
      let index = 1;
      const loaded = [];
      const cacheBuster = Date.now();

      while (true) {
        const jsonFile = `latest/${index}.json`;
        const pngFile = `latest/${index}.png`;

        try {
          const jsonRes = await fetch(`${jsonFile}?t=${cacheBuster}`);
          if (jsonRes.ok) {
            const data = await jsonRes.json();
            loaded.push({ type: 'json', content: data.content, source: data.source });
            index++;
            continue;
          }
        } catch (e) {}

        try {
          const pngRes = await fetch(`${pngFile}?t=${cacheBuster}`, { cache: 'no-store' });
          if (pngRes.ok) {
            loaded.push({ type: 'png', src: `${pngFile}?t=${cacheBuster}`, source: '' });
            index++;
            continue;
          }
        } catch (e) {}

        break;
      }

      return loaded;
    }

    function saveToSession(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {}
    }

    function loadFromSession() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : null;
      } catch (e) {
        return null;
      }
    }

    function dataChanged(newData, oldData) {
      if (!oldData || newData.length !== oldData.length) return true;
      return JSON.stringify(newData) !== JSON.stringify(oldData);
    }

    function preloadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        let completed = false;
        const timeoutId = setTimeout(() => {
          if (completed) return;
          completed = true;
          reject(new Error(`Timed out loading image: ${src}`));
        }, 8000);

        image.onload = () => {
          if (completed) return;
          completed = true;
          clearTimeout(timeoutId);
          resolve();
        };

        image.onerror = () => {
          if (completed) return;
          completed = true;
          clearTimeout(timeoutId);
          reject(new Error(`Failed to load image: ${src}`));
        };

        image.src = src;
      });
    }

    async function imagesReady(data) {
      const imageSlides = data.filter((slide) => slide.type === 'png');
      if (imageSlides.length === 0) return true;
      const results = await Promise.allSettled(
        imageSlides.map((slide) => preloadImage(slide.src))
      );
      return results.every((result) => result.status === 'fulfilled');
    }

    async function applySlidesIfReady(nextSlides, preserveIndex = false) {
      if (nextSlides.length === 0 || !dataChanged(nextSlides, slides)) return false;

      const usable = await imagesReady(nextSlides);
      if (!usable) return false;

      const prevIndex = currentIndex;
      slides = nextSlides;
      saveToSession(slides);
      if (preserveIndex) {
        currentIndex = Math.min(prevIndex, slides.length - 1);
      }
      render();
      if (!intervalId) startTimer();
      return true;
    }

    async function loadSlides() {
      const cached = loadFromSession();
      let cacheRendered = false;
      
      if (cached && cached.length > 0) {
        const cachedUsable = await imagesReady(cached);
        if (cachedUsable) {
          slides = cached;
          render();
          startTimer();
          cacheRendered = true;
        } else {
          localStorage.removeItem(STORAGE_KEY);
        }
      } else {
        container.innerHTML = '<div class="loading">Loading...</div>';
      }

      if (!cacheRendered) {
        container.innerHTML = '<div class="loading">Loading...</div>';
      }

      const freshData = await fetchSlides();

      const applied = await applySlidesIfReady(freshData);
      if (!applied && slides.length === 0) {
        container.innerHTML = '<div class="error">No content found in latest/ folder</div>';
      }
    }

    async function refreshData() {
      try {
        const freshData = await fetchSlides();
        await applySlidesIfReady(freshData, true);
      } catch (e) {}
    }

    setInterval(refreshData, REFRESH_INTERVAL * 1000);

    function hashText(text) {
      let hash = 0;
      for (let i = 0; i < text.length; i++) {
        hash = (hash * 31 + text.charCodeAt(i)) >>> 0;
      }
      return `${hash}:${text.length}`;
    }

    async function fetchIndexHtmlSignature() {
      const url = `./index.html?t=${Date.now()}`;

      try {
        const headRes = await fetch(url, { method: 'HEAD', cache: 'no-store' });
        if (headRes.ok) {
          const etag = headRes.headers.get('etag');
          const lastModified = headRes.headers.get('last-modified');
          if (etag || lastModified) {
            return `h:${etag || ''}|${lastModified || ''}`;
          }
        }
      } catch (e) {}

      try {
        const htmlRes = await fetch(url, { cache: 'no-store' });
        if (!htmlRes.ok) return null;

        const etag = htmlRes.headers.get('etag');
        const lastModified = htmlRes.headers.get('last-modified');
        if (etag || lastModified) {
          return `g:${etag || ''}|${lastModified || ''}`;
        }

        const html = await htmlRes.text();
        return `b:${hashText(html)}`;
      } catch (e) {
        return null;
      }
    }

    async function checkForIndexHtmlUpdate() {
      const latestSignature = await fetchIndexHtmlSignature();
      if (!latestSignature) return;

      if (!indexHtmlSignature) {
        indexHtmlSignature = latestSignature;
        return;
      }

      if (latestSignature !== indexHtmlSignature) {
        window.location.reload();
      }
    }

    setInterval(checkForIndexHtmlUpdate, INDEX_HTML_CHECK_INTERVAL * 1000);

    function render() {
      container.innerHTML = slides.map((slide, i) => {
        const activeClass = i === currentIndex ? 'active' : '';
        if (slide.type === 'json') {
          return `
            <div class="slide ${activeClass}">
              <div class="content text">${formatContent(slide.content)}</div>
              ${slide.source ? `<div class="source">${escapeHtml(slide.source)}</div>` : ''}
            </div>
          `;
        } else {
          return `
            <div class="slide ${activeClass}">
              <div class="content"><img src="${slide.src}" alt="Slide ${i + 1}"></div>
              ${slide.source ? `<div class="source">${escapeHtml(slide.source)}</div>` : ''}
            </div>
          `;
        }
      }).join('');

      renderDots();
      updateTimer();
      fitText();
    }

    function fitText() {
      const textElements = document.querySelectorAll('.content.text');
      const maxFontSize = 120;
      const minFontSize = 16;
      const availableWidth = window.innerWidth - (MARGIN * 2);
      const availableHeight = window.innerHeight - (MARGIN * 2) - 60;

      // Create hidden measurement container
      const measureDiv = document.createElement('div');
      measureDiv.style.cssText = `
        position: absolute;
        visibility: hidden;
        width: ${availableWidth}px;
        line-height: 1.5;
        text-align: center;
        word-wrap: break-word;
        overflow-wrap: anywhere;
        padding: 0;
        top: 0;
        left: 0;
      `;
      document.body.appendChild(measureDiv);

      textElements.forEach(el => {
        measureDiv.innerHTML = el.innerHTML;
        
        let low = minFontSize;
        let high = maxFontSize;
        let bestFit = minFontSize;

        while (low <= high) {
          const mid = Math.floor((low + high) / 2);
          measureDiv.style.fontSize = mid + 'px';
          
          if (measureDiv.offsetHeight <= availableHeight) {
            bestFit = mid;
            low = mid + 1;
          } else {
            high = mid - 1;
          }
        }
        
        el.style.fontSize = bestFit + 'px';
        el.style.width = availableWidth + 'px';
        el.style.padding = MARGIN + 'px';
      });

      document.body.removeChild(measureDiv);
    }

    window.addEventListener('resize', fitText);

    function renderDots() {
      dotsContainer.innerHTML = slides.map((_, i) => 
        `<div class="dot ${i === currentIndex ? 'active' : ''}" onclick="goToSlide(${i})"></div>`
      ).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatContent(text) {
      const div = document.createElement('div');
      div.textContent = text;
      let escaped = div.innerHTML;
      // Convert newlines to <br>
      escaped = escaped.replace(/\n/g, '<br>');
      return escaped;
    }

    function updateTimer() {
      timerDisplay.textContent = isPaused ? `Paused (${countdown}s)` : `${countdown}s`;
    }

    function startTimer() {
      if (intervalId) clearInterval(intervalId);
      countdown = SLIDE_DURATION;
      updateTimer();
      
      intervalId = setInterval(() => {
        if (isPaused) return;
        countdown--;
        updateTimer();
        
        if (countdown <= 0) {
          next();
        }
      }, 1000);
    }

    function showSlide(index) {
      if (slides.length === 0) return;
      currentIndex = (index + slides.length) % slides.length;
      
      document.querySelectorAll('.slide').forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
      });
      
      document.querySelectorAll('.dot').forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
      });
      
      countdown = SLIDE_DURATION;
      updateTimer();
    }

    function goToSlide(index) {
      showSlide(index);
    }

    function next() {
      showSlide(currentIndex + 1);
    }

    function prev() {
      showSlide(currentIndex - 1);
    }

    function togglePause() {
      if (slides.length === 0) return;
      isPaused = !isPaused;
      updateTimer();
    }

    document.addEventListener('keydown', (e) => {
      const isSpace = e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar';
      if (isSpace) {
        e.preventDefault();
        if (!e.repeat) togglePause();
        return;
      }
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
    });

    loadSlides();
    checkForIndexHtmlUpdate();

    // Register Service Worker for offline support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
