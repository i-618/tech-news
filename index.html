<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech News</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-dim: #1f6feb;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --card-bg: #21262d;
      --danger: #f85149;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    #date-label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* ── Slideshow wrapper ───────────────────────────────────── */
    #slideshow {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 120px);
      padding: 24px;
      position: relative;
    }

    /* ── Slide card ──────────────────────────────────────────── */
    #slide-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 760px;
      width: 100%;
      padding: 0;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      animation: fadeIn .35s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Image slide */
    #slide-card.image-slide img {
      width: 100%;
      max-height: 70vh;
      object-fit: contain;
      display: block;
      background: #000;
    }

    #slide-card.image-slide .img-caption {
      padding: 14px 20px;
      font-size: 0.85rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    /* JSON / text slide */
    .text-slide-body {
      padding: 36px 40px 32px;
    }

    .slide-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      border-radius: 4px;
      padding: 2px 8px;
      margin-bottom: 16px;
    }

    .slide-title {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 20px;
      color: var(--text);
    }

    .slide-content {
      font-size: 1rem;
      line-height: 1.75;
      color: #c9d1d9;
      margin-bottom: 28px;
    }

    .slide-credits {
      font-size: 0.8rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    .slide-credits span {
      font-weight: 600;
      color: var(--text-muted);
    }

    /* ── Nav arrows ──────────────────────────────────────────── */
    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, border-color .2s;
      z-index: 5;
      font-size: 1.1rem;
    }

    .nav-btn:hover { background: var(--accent-dim); border-color: var(--accent); }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }

    #btn-prev { left: 16px; }
    #btn-next { right: 16px; }

    /* ── Footer / progress bar ───────────────────────────────── */
    footer {
      position: sticky;
      bottom: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #dots {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: background .2s, transform .2s;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.3);
    }

    #progress-bar-wrap {
      width: 100%;
      max-width: 400px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width linear;
    }

    #slide-counter {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    #autoplay-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }

    #autoplay-btn:hover { border-color: var(--accent); color: var(--accent); }

    #footer-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* ── Error / loading states ──────────────────────────────── */
    #status {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    #status.error { color: var(--danger); }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 600px) {
      .text-slide-body { padding: 24px 20px 20px; }
      .slide-title { font-size: 1.25rem; }
      .nav-btn { width: 36px; height: 36px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>📡 Tech News</h1>
  <span id="date-label">Loading…</span>
</header>

<main id="slideshow">
  <div id="status">Loading latest news…</div>
</main>

<button class="nav-btn" id="btn-prev" title="Previous (←)" aria-label="Previous slide">&#8592;</button>
<button class="nav-btn" id="btn-next" title="Next (→)" aria-label="Next slide">&#8594;</button>

<footer>
  <div id="dots"></div>
  <div id="footer-row">
    <span id="slide-counter"></span>
    <button id="autoplay-btn">⏸ Pause</button>
  </div>
  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>
</footer>

<script>
(function () {
  'use strict';

  /* ── Config ────────────────────────────────────────────────── */
  const AUTOPLAY_MS   = 7000; // ms per slide
  const SWIPE_MIN_PX  = 50;  // minimum px swipe distance to trigger slide change
  const IMAGE_EXTS    = new Set(['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'avif']);

  /* ── State ─────────────────────────────────────────────────── */
  let slides      = [];   // array of {type:'image'|'text', ...}
  let current     = 0;
  let autoplay    = true;
  let timer       = null;
  let timerStart  = null;
  let elapsed     = 0;

  /* ── DOM refs ──────────────────────────────────────────────── */
  const slideshow    = document.getElementById('slideshow');
  const statusEl     = document.getElementById('status');
  const dotsEl       = document.getElementById('dots');
  const counterEl    = document.getElementById('slide-counter');
  const autoplayBtn  = document.getElementById('autoplay-btn');
  const progressBar  = document.getElementById('progress-bar');
  const dateLabel    = document.getElementById('date-label');
  const btnPrev      = document.getElementById('btn-prev');
  const btnNext      = document.getElementById('btn-next');

  /* ── Helpers ───────────────────────────────────────────────── */
  function ext(filename) {
    return filename.split('.').pop().toLowerCase();
  }

  function isImage(filename) {
    return IMAGE_EXTS.has(ext(filename));
  }

  function setStatus(msg, isError = false) {
    statusEl.textContent = msg;
    statusEl.className = isError ? 'error' : '';
    statusEl.style.display = '';
  }

  /* ── Data loading ──────────────────────────────────────────── */
  async function init() {
    try {
      // 1. Read latest.txt
      const latestRes = await fetch('latest.txt');
      if (!latestRes.ok) throw new Error('Could not load latest.txt');
      const folder = (await latestRes.text()).trim();

      // 2. Format date for display
      const parts = folder.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (parts) {
        const d = new Date(Number(parts[1]), Number(parts[2]) - 1, Number(parts[3]));
        dateLabel.textContent = d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
      } else {
        dateLabel.textContent = folder;
      }

      // 3. Load manifest
      const manifestRes = await fetch(`${folder}/index.json`);
      if (!manifestRes.ok) throw new Error(`Could not load ${folder}/index.json`);
      const manifest = await manifestRes.json();
      if (!Array.isArray(manifest) || manifest.length === 0) {
        throw new Error('No slides found in manifest');
      }

      // 4. Load all slide data
      const loaded = await Promise.all(
        manifest.map(filename => loadSlide(folder, filename))
      );
      slides = loaded.filter(Boolean);

      if (slides.length === 0) throw new Error('No valid slides could be loaded');

      // 5. Render
      statusEl.style.display = 'none';
      buildDots();
      showSlide(0);
      startTimer();
    } catch (err) {
      setStatus('Error: ' + err.message, true);
      console.error(err);
    }
  }

  async function loadSlide(folder, filename) {
    if (isImage(filename)) {
      return { type: 'image', src: `${folder}/${filename}`, filename };
    }
    if (ext(filename) === 'json') {
      try {
        const res = await fetch(`${folder}/${filename}`);
        if (!res.ok) return null;
        const data = await res.json();
        return { type: 'text', title: data.title || '', content: data.content || '', credits: data.credits || '' };
      } catch {
        return null;
      }
    }
    return null;
  }

  /* ── Rendering ─────────────────────────────────────────────── */
  function buildDots() {
    dotsEl.innerHTML = '';
    slides.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'dot';
      dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
      dot.setAttribute('type', 'button');
      dot.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(dot);
    });
  }

  function showSlide(index) {
    current = ((index % slides.length) + slides.length) % slides.length;
    const slide = slides[current];

    // Remove existing card
    const old = document.getElementById('slide-card');
    if (old) old.remove();

    const card = document.createElement('div');
    card.id = 'slide-card';

    if (slide.type === 'image') {
      card.classList.add('image-slide');
      const img = document.createElement('img');
      img.src = slide.src;
      img.alt = slide.filename;
      card.appendChild(img);

      const cap = document.createElement('div');
      cap.className = 'img-caption';
      cap.textContent = slide.filename;
      card.appendChild(cap);
    } else {
      const body = document.createElement('div');
      body.className = 'text-slide-body';

      const tag = document.createElement('div');
      tag.className = 'slide-tag';
      tag.textContent = 'Tech News';
      body.appendChild(tag);

      const title = document.createElement('h2');
      title.className = 'slide-title';
      title.textContent = slide.title;
      body.appendChild(title);

      const content = document.createElement('p');
      content.className = 'slide-content';
      content.textContent = slide.content;
      body.appendChild(content);

      if (slide.credits) {
        const credits = document.createElement('div');
        credits.className = 'slide-credits';
        credits.innerHTML = `<span>Source:</span> ${escapeHtml(slide.credits)}`;
        body.appendChild(credits);
      }

      card.appendChild(body);
    }

    slideshow.appendChild(card);
    updateDots();
    updateCounter();
    updateNavButtons();
    resetProgressBar();
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function updateDots() {
    dotsEl.querySelectorAll('.dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === current);
    });
  }

  function updateCounter() {
    counterEl.textContent = `${current + 1} / ${slides.length}`;
  }

  function updateNavButtons() {
    // Navigation wraps around (last slide → first, first slide → last),
    // so both buttons remain enabled at all times.
    btnPrev.disabled = false;
    btnNext.disabled = false;
  }

  /* ── Navigation ────────────────────────────────────────────── */
  function goTo(index) {
    stopTimer();
    elapsed = 0;
    showSlide(index);
    if (autoplay) startTimer();
  }

  function next() { goTo(current + 1); }
  function prev() { goTo(current - 1); }

  btnNext.addEventListener('click', next);
  btnPrev.addEventListener('click', prev);

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prev();
    if (e.key === ' ') { e.preventDefault(); toggleAutoplay(); }
  });

  /* ── Autoplay + progress bar ───────────────────────────────── */
  function startTimer() {
    timerStart = Date.now();
    const remaining = AUTOPLAY_MS - elapsed;

    progressBar.style.transition = `width ${remaining}ms linear`;
    progressBar.style.width = '100%';

    timer = setTimeout(() => {
      elapsed = 0;
      showSlide(current + 1);
      startTimer();
    }, remaining);
  }

  function stopTimer() {
    clearTimeout(timer);
    timer = null;
    if (timerStart !== null) {
      elapsed += Date.now() - timerStart;
      if (elapsed >= AUTOPLAY_MS) elapsed = 0;
      timerStart = null;
    }
    // Freeze progress bar
    const pct = Math.min((elapsed / AUTOPLAY_MS) * 100, 100);
    progressBar.style.transition = 'none';
    progressBar.style.width = `${pct}%`;
  }

  function resetProgressBar() {
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
  }

  function toggleAutoplay() {
    autoplay = !autoplay;
    if (autoplay) {
      autoplayBtn.textContent = '⏸ Pause';
      startTimer();
    } else {
      autoplayBtn.textContent = '▶ Play';
      stopTimer();
    }
  }

  autoplayBtn.addEventListener('click', toggleAutoplay);

  /* ── Touch / swipe support ─────────────────────────────────── */
  let touchStartX = 0;
  slideshow.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  slideshow.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > SWIPE_MIN_PX) dx < 0 ? next() : prev();
  }, { passive: true });

  /* ── Boot ──────────────────────────────────────────────────── */
  init();
})();
</script>

</body>
</html>
