  <script>
    // ═══════════════════════════════════════════════════════════
    // CONFIGURATION
    // ═══════════════════════════════════════════════════════════
    const SLIDE_DURATION = 15;        // Slide duration in seconds
    const MARGIN = 40;               // Margin around content in pixels
    const REFRESH_INTERVAL = 30;     // Data refresh interval in seconds
    const INDEX_HTML_CHECK_INTERVAL = 60; // Check index.html updates in seconds
    // ═══════════════════════════════════════════════════════════
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
    }

    .slide {
      width: 100vw;
      height: 100vh;
      display: none;
      position: relative;
    }

    .slide.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .content {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .content.text {
      line-height: 1.5;
      text-align: center;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }

    .content img {
      max-width: 100%;
      max-height: calc(100vh - 6rem);
      object-fit: contain;
    }

    .source {
      position: absolute;
      bottom: 1.5rem;
      left: 2rem;
      font-size: clamp(0.8rem, 1.2vw, 1.1rem);
      color: #f5f5f5;
      background: rgba(255, 255, 255, 0.15);
      padding: 0.4rem 1rem;
      border-radius: 50px;
      max-width: 40%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 700;
    }

    .timer {
      position: fixed;
      bottom: 1.5rem;
      right: 2rem;
      font-size: 1.2rem;
      color: #555;
      font-variant-numeric: tabular-nums;
    }

    .dots {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.6rem;
      z-index: 100;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #333;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot:hover {
      background: #555;
    }

    .dot.active {
      background: #f5f5f5;
      transform: scale(1.2);
    }

    .loading, .error {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 1.2rem;
      color: #666;
    }

    .last-updated {
      position: fixed;
      top: 0.75rem;
      right: 1rem;
      font-size: 0.72rem;
      color: #8a8a8a;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      z-index: 120;
      text-align: right;
      max-width: min(58vw, 360px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="container"></div>
  <div class="dots" id="dots"></div>
  <div class="timer" id="timer"></div>
  <div class="last-updated" id="last-updated"></div>

  <script>
    const container = document.getElementById('container');
    const dotsContainer = document.getElementById('dots');
    const timerDisplay = document.getElementById('timer');
    const lastUpdatedDisplay = document.getElementById('last-updated');
    
    const STORAGE_KEY = 'slideshow_data_v2';
    const LEGACY_STORAGE_KEY = 'slideshow_data';
    const LAST_UPDATED_KEY = 'slideshow_last_updated_ms_v1';
    const IMAGE_DB_NAME = 'tech-news-images';
    const IMAGE_STORE_NAME = 'slides';
    let slides = [];
    let currentIndex = 0;
    let countdown = SLIDE_DURATION;
    let intervalId = null;
    let isPaused = false;
    let indexHtmlSignature = null;
    let imageDbPromise = null;
    let lastUpdatedMs = null;

    function parseDateToMs(value) {
      if (typeof value !== 'string' || value.trim() === '') return null;
      const parsed = Date.parse(value);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function readUpdatedAtFromPayload(payload) {
      if (!payload || typeof payload !== 'object') return null;
      const candidates = [
        payload.updatedAt,
        payload.updated_at,
        payload.gitFetchedAt,
        payload.git_fetched_at,
        payload.timestamp
      ];
      for (const candidate of candidates) {
        if (typeof candidate !== 'string') continue;
        const parsed = parseDateToMs(candidate);
        if (parsed !== null) return parsed;
      }
      return null;
    }

    function readUpdatedAtFromResponse(response) {
      if (!response || !response.headers) return null;
      const candidates = [
        response.headers.get('x-git-fetch-time'),
        response.headers.get('x-last-updated'),
        response.headers.get('last-modified')
      ];
      for (const candidate of candidates) {
        const parsed = parseDateToMs(candidate);
        if (parsed !== null) return parsed;
      }
      return null;
    }

    function formatUpdatedAt(ms) {
      if (!Number.isFinite(ms)) return 'Last updated: --';
      const dateText = new Intl.DateTimeFormat(undefined, {
        month: 'short',
        day: '2-digit',
        year: 'numeric'
      }).format(new Date(ms));
      const timeText = new Intl.DateTimeFormat(undefined, {
        hour: '2-digit',
        minute: '2-digit'
      }).format(new Date(ms));
      return `Last updated on ${dateText}`;
    }

    function renderUpdatedAt() {
      if (!lastUpdatedDisplay) return;
      lastUpdatedDisplay.textContent = formatUpdatedAt(lastUpdatedMs);
    }

    function setLastUpdated(ms) {
      if (!Number.isFinite(ms)) return;
      lastUpdatedMs = ms;
      renderUpdatedAt();
      try {
        localStorage.setItem(LAST_UPDATED_KEY, String(ms));
      } catch (e) {}
    }

    function loadLastUpdated() {
      try {
        const raw = localStorage.getItem(LAST_UPDATED_KEY);
        if (!raw) return;
        const parsed = Number(raw);
        if (Number.isFinite(parsed)) {
          lastUpdatedMs = parsed;
        }
      } catch (e) {}
    }

    function openImageDb() {
      if (!('indexedDB' in window)) return Promise.resolve(null);
      if (!imageDbPromise) {
        imageDbPromise = new Promise((resolve) => {
          const request = indexedDB.open(IMAGE_DB_NAME, 1);

          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(IMAGE_STORE_NAME)) {
              db.createObjectStore(IMAGE_STORE_NAME);
            }
          };

          request.onsuccess = () => resolve(request.result);
          request.onerror = () => resolve(null);
        });
      }
      return imageDbPromise;
    }

    async function withImageStore(mode, fn) {
      const db = await openImageDb();
      if (!db) return null;

      return new Promise((resolve) => {
        const tx = db.transaction(IMAGE_STORE_NAME, mode);
        const store = tx.objectStore(IMAGE_STORE_NAME);

        tx.oncomplete = () => resolve(result);
        tx.onerror = () => resolve(null);
        tx.onabort = () => resolve(null);

        let result = null;
        try {
          const maybeRequest = fn(store);
          if (maybeRequest && typeof maybeRequest === 'object' && 'onsuccess' in maybeRequest) {
            maybeRequest.onsuccess = () => {
              result = maybeRequest.result;
            };
            maybeRequest.onerror = () => {
              result = null;
            };
          } else {
            result = maybeRequest;
          }
        } catch (e) {
          result = null;
        }
      });
    }

    async function storeImageBlob(key, blob) {
      await withImageStore('readwrite', (store) => store.put(blob, key));
    }

    async function loadImageBlob(key) {
      return withImageStore('readonly', (store) => store.get(key));
    }

    async function hashBlob(blob) {
      if (!window.crypto || !window.crypto.subtle) {
        return `${blob.size}:${blob.type || ''}`;
      }

      try {
        const buffer = await blob.arrayBuffer();
        const digest = await crypto.subtle.digest('SHA-256', buffer);
        return Array.from(new Uint8Array(digest))
          .map((byte) => byte.toString(16).padStart(2, '0'))
          .join('');
      } catch (e) {
        return `${blob.size}:${blob.type || ''}`;
      }
    }

    async function listStoredImageKeys() {
      const keys = await withImageStore('readonly', (store) => {
        if ('getAllKeys' in store) return store.getAllKeys();
        return null;
      });
      return Array.isArray(keys) ? keys : [];
    }

    async function deleteStoredImage(key) {
      await withImageStore('readwrite', (store) => store.delete(key));
    }

    async function requestPersistentStorage() {
      if (!navigator.storage || typeof navigator.storage.persist !== 'function') return false;
      try {
        return navigator.storage.persist();
      } catch (e) {
        return false;
      }
    }

    function getSlideImageUrl(slide) {
      return slide.runtimeSrc || slide.src;
    }

    function revokeSlideUrls(items) {
      items.forEach((slide) => {
        if (slide.type === 'png' && slide.runtimeSrc && slide.runtimeSrc.startsWith('blob:')) {
          URL.revokeObjectURL(slide.runtimeSrc);
        }
      });
    }

    async function materializeSlides(data) {
      const materialized = [];

      for (const slide of data) {
        if (slide.type !== 'png') {
          materialized.push(slide);
          continue;
        }

        const imageKey = slide.imageKey || (slide.src ? slide.src.split('?')[0] : '');
        let runtimeSrc = slide.src || '';

        if (imageKey) {
          const blob = await loadImageBlob(imageKey);
          if (blob instanceof Blob) {
            runtimeSrc = URL.createObjectURL(blob);
          }
        }

        materialized.push({
          type: 'png',
          imageKey,
          imageVersion: slide.imageVersion || '',
          runtimeSrc,
          source: slide.source || ''
        });
      }

      return materialized;
    }

    function serializeSlides(data) {
      return data.map((slide) => {
        if (slide.type !== 'png') return slide;
        return {
          type: 'png',
          imageKey: slide.imageKey || (slide.src ? slide.src.split('?')[0] : ''),
          imageVersion: slide.imageVersion || '',
          source: slide.source || ''
        };
      });
    }

    async function pruneStoredImages(data) {
      const activeKeys = new Set(
        data
          .filter((slide) => slide.type === 'png' && slide.imageKey)
          .map((slide) => slide.imageKey)
      );

      const storedKeys = await listStoredImageKeys();
      await Promise.all(
        storedKeys
          .filter((key) => !activeKeys.has(key))
          .map((key) => deleteStoredImage(key))
      );
    }

    async function fetchSlides() {
      let index = 1;
      const loaded = [];
      const cacheBuster = Date.now();
      let terminationUncertain = false;
      let lastUpdatedFromFetch = null;

      while (true) {
        const jsonFile = `latest/${index}.json`;
        const pngFile = `latest/${index}.png`;
        let jsonFetchFailed = false;
        let pngFetchFailed = false;

        try {
          const jsonRes = await fetch(`${jsonFile}?t=${cacheBuster}`);
          if (jsonRes.ok) {
            const data = await jsonRes.json();
            const fromPayload = readUpdatedAtFromPayload(data);
            const fromHeaders = readUpdatedAtFromResponse(jsonRes);
            const candidate = fromPayload || fromHeaders;
            if (candidate !== null) {
              lastUpdatedFromFetch = Math.max(lastUpdatedFromFetch || 0, candidate);
            }
            loaded.push({ type: 'json', content: data.content, source: data.source });
            index++;
            continue;
          }
        } catch (e) {
          jsonFetchFailed = true;
        }

        let canUseStoredPng = false;
        try {
          const pngRes = await fetch(`${pngFile}?t=${cacheBuster}`, { cache: 'no-store' });
          if (pngRes.ok) {
            const fromHeaders = readUpdatedAtFromResponse(pngRes);
            if (fromHeaders !== null) {
              lastUpdatedFromFetch = Math.max(lastUpdatedFromFetch || 0, fromHeaders);
            }
            const blob = await pngRes.blob();
            const imageVersion = await hashBlob(blob);
            await storeImageBlob(pngFile, blob);
            loaded.push({ type: 'png', imageKey: pngFile, imageVersion, source: '' });
            index++;
            continue;
          }
        } catch (e) {
          pngFetchFailed = true;
          canUseStoredPng = true;
        }

        if (canUseStoredPng) {
          const storedBlob = await loadImageBlob(pngFile);
          if (storedBlob instanceof Blob) {
            const imageVersion = await hashBlob(storedBlob);
            loaded.push({ type: 'png', imageKey: pngFile, imageVersion, source: '' });
            index++;
            continue;
          }
        }

        terminationUncertain = jsonFetchFailed || pngFetchFailed;
        break;
      }

      return {
        slides: await materializeSlides(loaded),
        terminationUncertain,
        lastUpdatedMs: lastUpdatedFromFetch
      };
    }

    function saveToSession(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(serializeSlides(data)));
        localStorage.removeItem(LEGACY_STORAGE_KEY);
      } catch (e) {}
    }

    function loadFromSession() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) return JSON.parse(data);

        const legacyData = localStorage.getItem(LEGACY_STORAGE_KEY);
        return legacyData ? JSON.parse(legacyData) : null;
      } catch (e) {
        return null;
      }
    }

    function dataChanged(newData, oldData) {
      if (!oldData || newData.length !== oldData.length) return true;
      return JSON.stringify(serializeSlides(newData)) !== JSON.stringify(serializeSlides(oldData));
    }

    function preloadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        let completed = false;
        const timeoutId = setTimeout(() => {
          if (completed) return;
          completed = true;
          reject(new Error(`Timed out loading image: ${src}`));
        }, 8000);

        image.onload = () => {
          if (completed) return;
          completed = true;
          clearTimeout(timeoutId);
          resolve();
        };

        image.onerror = () => {
          if (completed) return;
          completed = true;
          clearTimeout(timeoutId);
          reject(new Error(`Failed to load image: ${src}`));
        };

        image.src = src;
      });
    }

    async function imagesReady(data) {
      const imageSlides = data.filter((slide) => slide.type === 'png');
      if (imageSlides.length === 0) return true;
      const results = await Promise.allSettled(
        imageSlides.map((slide) => preloadImage(getSlideImageUrl(slide)))
      );
      return results.every((result) => result.status === 'fulfilled');
    }

    async function applySlidesIfReady(nextSlides, preserveIndex = false, options = {}) {
      const terminationUncertain = Boolean(options.terminationUncertain);

      if (nextSlides.length === 0) {
        revokeSlideUrls(nextSlides);
        return false;
      }

      const wouldShrinkExistingData = slides.length > 0 && nextSlides.length < slides.length;
      if (terminationUncertain && wouldShrinkExistingData) {
        revokeSlideUrls(nextSlides);
        return false;
      }

      if (!dataChanged(nextSlides, slides)) {
        revokeSlideUrls(nextSlides);
        return false;
      }

      const usable = await imagesReady(nextSlides);
      if (!usable) {
        revokeSlideUrls(nextSlides);
        return false;
      }

      const prevIndex = currentIndex;
      revokeSlideUrls(slides);
      slides = nextSlides;
      saveToSession(slides);
      await pruneStoredImages(slides);
      if (preserveIndex) {
        currentIndex = Math.min(prevIndex, slides.length - 1);
      }
      render();
      if (!intervalId) startTimer();
      return true;
    }

    async function loadSlides() {
      await requestPersistentStorage();
      loadLastUpdated();
      renderUpdatedAt();
      const cached = await materializeSlides(loadFromSession() || []);
      let cacheRendered = false;
      
      if (cached && cached.length > 0) {
        const cachedUsable = await imagesReady(cached);
        if (cachedUsable) {
          slides = cached;
          render();
          startTimer();
          cacheRendered = true;
        } else {
          revokeSlideUrls(cached);
          localStorage.removeItem(STORAGE_KEY);
          localStorage.removeItem(LEGACY_STORAGE_KEY);
        }
      } else {
        container.innerHTML = '<div class="loading">Loading...</div>';
      }

      if (!cacheRendered) {
        container.innerHTML = '<div class="loading">Loading...</div>';
      }

      const freshResult = await fetchSlides();
      const freshData = freshResult.slides;
      if (freshResult.lastUpdatedMs !== null) {
        setLastUpdated(freshResult.lastUpdatedMs);
      }

      const applied = await applySlidesIfReady(freshData, false, {
        terminationUncertain: freshResult.terminationUncertain
      });
      if (!applied && slides.length === 0) {
        container.innerHTML = '<div class="error">No content found in latest/ folder</div>';
      }
    }

    async function refreshData() {
      try {
        const freshResult = await fetchSlides();
        if (freshResult.lastUpdatedMs !== null) {
          setLastUpdated(freshResult.lastUpdatedMs);
        }
        await applySlidesIfReady(freshResult.slides, true, {
          terminationUncertain: freshResult.terminationUncertain
        });
      } catch (e) {}
    }

    setInterval(refreshData, REFRESH_INTERVAL * 1000);

    function hashText(text) {
      let hash = 0;
      for (let i = 0; i < text.length; i++) {
        hash = (hash * 31 + text.charCodeAt(i)) >>> 0;
      }
      return `${hash}:${text.length}`;
    }

    async function fetchIndexHtmlSignature() {
      const url = `./index.html?t=${Date.now()}`;

      try {
        const headRes = await fetch(url, { method: 'HEAD', cache: 'no-store' });
        if (headRes.ok) {
          const etag = headRes.headers.get('etag');
          const lastModified = headRes.headers.get('last-modified');
          if (etag || lastModified) {
            return `h:${etag || ''}|${lastModified || ''}`;
          }
        }
      } catch (e) {}

      try {
        const htmlRes = await fetch(url, { cache: 'no-store' });
        if (!htmlRes.ok) return null;

        const etag = htmlRes.headers.get('etag');
        const lastModified = htmlRes.headers.get('last-modified');
        if (etag || lastModified) {
          return `g:${etag || ''}|${lastModified || ''}`;
        }

        const html = await htmlRes.text();
        return `b:${hashText(html)}`;
      } catch (e) {
        return null;
      }
    }

    async function checkForIndexHtmlUpdate() {
      const latestSignature = await fetchIndexHtmlSignature();
      if (!latestSignature) return;

      if (!indexHtmlSignature) {
        indexHtmlSignature = latestSignature;
        return;
      }

      if (latestSignature !== indexHtmlSignature) {
        window.location.reload();
      }
    }

    setInterval(checkForIndexHtmlUpdate, INDEX_HTML_CHECK_INTERVAL * 1000);

    function render() {
      container.innerHTML = slides.map((slide, i) => {
        const activeClass = i === currentIndex ? 'active' : '';
        if (slide.type === 'json') {
          return `
            <div class="slide ${activeClass}">
              <div class="content text">${formatContent(slide.content)}</div>
              ${slide.source ? `<div class="source">${escapeHtml(slide.source)}</div>` : ''}
            </div>
          `;
        } else {
          return `
            <div class="slide ${activeClass}">
              <div class="content"><img src="${getSlideImageUrl(slide)}" alt="Slide ${i + 1}"></div>
              ${slide.source ? `<div class="source">${escapeHtml(slide.source)}</div>` : ''}
            </div>
          `;
        }
      }).join('');

      renderDots();
      updateTimer();
      fitText();
    }

    function fitText() {
      const textElements = document.querySelectorAll('.content.text');
      const maxFontSize = 120;
      const minFontSize = 16;
      const availableWidth = window.innerWidth - (MARGIN * 2);
      const availableHeight = window.innerHeight - (MARGIN * 2) - 60;

      // Create hidden measurement container
      const measureDiv = document.createElement('div');
      measureDiv.style.cssText = `
        position: absolute;
        visibility: hidden;
        width: ${availableWidth}px;
        line-height: 1.5;
        text-align: center;
        word-wrap: break-word;
        overflow-wrap: anywhere;
        padding: 0;
        top: 0;
        left: 0;
      `;
      document.body.appendChild(measureDiv);

      textElements.forEach(el => {
        measureDiv.innerHTML = el.innerHTML;
        
        let low = minFontSize;
        let high = maxFontSize;
        let bestFit = minFontSize;

        while (low <= high) {
          const mid = Math.floor((low + high) / 2);
          measureDiv.style.fontSize = mid + 'px';
          
          if (measureDiv.offsetHeight <= availableHeight) {
            bestFit = mid;
            low = mid + 1;
          } else {
            high = mid - 1;
          }
        }
        
        el.style.fontSize = bestFit + 'px';
        el.style.width = availableWidth + 'px';
        el.style.padding = MARGIN + 'px';
      });

      document.body.removeChild(measureDiv);
    }

    window.addEventListener('resize', fitText);

    function renderDots() {
      dotsContainer.innerHTML = slides.map((_, i) => 
        `<div class="dot ${i === currentIndex ? 'active' : ''}" onclick="goToSlide(${i})"></div>`
      ).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatContent(text) {
      const div = document.createElement('div');
      div.textContent = text;
      let escaped = div.innerHTML;
      // Convert newlines to <br>
      escaped = escaped.replace(/\n/g, '<br>');
      return escaped;
    }

    function updateTimer() {
      timerDisplay.textContent = isPaused ? `Paused (${countdown}s)` : `${countdown}s`;
    }

    function startTimer() {
      if (intervalId) clearInterval(intervalId);
      countdown = SLIDE_DURATION;
      updateTimer();
      
      intervalId = setInterval(() => {
        if (isPaused) return;
        countdown--;
        updateTimer();
        
        if (countdown <= 0) {
          next();
        }
      }, 1000);
    }

    function showSlide(index) {
      if (slides.length === 0) return;
      currentIndex = (index + slides.length) % slides.length;
      
      document.querySelectorAll('.slide').forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
      });
      
      document.querySelectorAll('.dot').forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
      });
      
      countdown = SLIDE_DURATION;
      updateTimer();
    }

    function goToSlide(index) {
      showSlide(index);
    }

    function next() {
      showSlide(currentIndex + 1);
    }

    function prev() {
      showSlide(currentIndex - 1);
    }

    function togglePause() {
      if (slides.length === 0) return;
      isPaused = !isPaused;
      updateTimer();
    }

    document.addEventListener('keydown', (e) => {
      const isSpace = e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar';
      if (isSpace) {
        e.preventDefault();
        if (!e.repeat) togglePause();
        return;
      }
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
    });

    loadSlides();
    checkForIndexHtmlUpdate();

    // Register Service Worker for offline support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
