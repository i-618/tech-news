<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Viewer</title>
  <script>
    // ═══════════════════════════════════════════════════════════
    // CONFIGURATION
    // ═══════════════════════════════════════════════════════════
    const SLIDE_DURATION = 8;        // Slide duration in seconds
    const MARGIN = 40;               // Margin around content in pixels
    const REFRESH_INTERVAL = 10;     // Data refresh interval in seconds
    // ═══════════════════════════════════════════════════════════
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
    }

    .slide {
      width: 100vw;
      height: 100vh;
      display: none;
      position: relative;
    }

    .slide.active {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .content {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .content.text {
      line-height: 1.5;
      text-align: center;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }

    .content img {
      max-width: 100%;
      max-height: calc(100vh - 6rem);
      object-fit: contain;
    }

    .source {
      position: absolute;
      bottom: 1.5rem;
      left: 2rem;
      font-size: clamp(0.8rem, 1.2vw, 1.1rem);
      color: #666;
      max-width: 40%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timer {
      position: fixed;
      bottom: 1.5rem;
      right: 2rem;
      font-size: 1.2rem;
      color: #555;
      font-variant-numeric: tabular-nums;
    }

    .dots {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.6rem;
      z-index: 100;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #333;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .dot:hover {
      background: #555;
    }

    .dot.active {
      background: #f5f5f5;
      transform: scale(1.2);
    }

    .loading, .error {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 1.2rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="container"></div>
  <div class="dots" id="dots"></div>
  <div class="timer" id="timer"></div>

  <script>
    const container = document.getElementById('container');
    const dotsContainer = document.getElementById('dots');
    const timerDisplay = document.getElementById('timer');
    
    const STORAGE_KEY = 'slideshow_data';
    let slides = [];
    let currentIndex = 0;
    let countdown = SLIDE_DURATION;
    let intervalId = null;

    async function fetchSlides() {
      let index = 1;
      const loaded = [];

      while (true) {
        const jsonFile = `latest/${index}.json`;
        const pngFile = `latest/${index}.png`;

        try {
          const jsonRes = await fetch(jsonFile, { cache: 'no-store' });
          if (jsonRes.ok) {
            const data = await jsonRes.json();
            loaded.push({ type: 'json', content: data.content, source: data.source });
            index++;
            continue;
          }
        } catch (e) {}

        try {
          const pngRes = await fetch(pngFile, { method: 'HEAD', cache: 'no-store' });
          if (pngRes.ok) {
            loaded.push({ type: 'png', src: pngFile, source: '' });
            index++;
            continue;
          }
        } catch (e) {}

        break;
      }

      return loaded;
    }

    function saveToSession(data) {
      try {
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {}
    }

    function loadFromSession() {
      try {
        const data = sessionStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : null;
      } catch (e) {
        return null;
      }
    }

    function dataChanged(newData, oldData) {
      if (!oldData || newData.length !== oldData.length) return true;
      return JSON.stringify(newData) !== JSON.stringify(oldData);
    }

    async function loadSlides() {
      const cached = loadFromSession();
      
      if (cached && cached.length > 0) {
        slides = cached;
        render();
        startTimer();
      } else {
        container.innerHTML = '<div class="loading">Loading...</div>';
      }

      const freshData = await fetchSlides();

      if (freshData.length > 0) {
        if (dataChanged(freshData, slides)) {
          slides = freshData;
          saveToSession(slides);
          render();
          if (!intervalId) startTimer();
        }
      } else if (slides.length === 0) {
        container.innerHTML = '<div class="error">No content found in latest/ folder</div>';
      }
    }

    async function refreshData() {
      try {
        const freshData = await fetchSlides();
        if (freshData.length > 0 && dataChanged(freshData, slides)) {
          const prevIndex = currentIndex;
          slides = freshData;
          saveToSession(slides);
          currentIndex = Math.min(prevIndex, slides.length - 1);
          render();
        }
      } catch (e) {}
    }

    setInterval(refreshData, REFRESH_INTERVAL * 1000);

    function render() {
      container.innerHTML = slides.map((slide, i) => {
        const activeClass = i === currentIndex ? 'active' : '';
        if (slide.type === 'json') {
          return `
            <div class="slide ${activeClass}">
              <div class="content text">${formatContent(slide.content)}</div>
              ${slide.source ? `<div class="source">${escapeHtml(slide.source)}</div>` : ''}
            </div>
          `;
        } else {
          return `
            <div class="slide ${activeClass}">
              <div class="content"><img src="${slide.src}" alt="Slide ${i + 1}"></div>
              ${slide.source ? `<div class="source">${escapeHtml(slide.source)}</div>` : ''}
            </div>
          `;
        }
      }).join('');

      renderDots();
      updateTimer();
      fitText();
    }

    function fitText() {
      const textElements = document.querySelectorAll('.content.text');
      const maxFontSize = 120;
      const minFontSize = 16;
      const availableWidth = window.innerWidth - (MARGIN * 2);
      const availableHeight = window.innerHeight - (MARGIN * 2) - 60;

      // Create hidden measurement container
      const measureDiv = document.createElement('div');
      measureDiv.style.cssText = `
        position: absolute;
        visibility: hidden;
        width: ${availableWidth}px;
        line-height: 1.5;
        text-align: center;
        word-wrap: break-word;
        overflow-wrap: anywhere;
        padding: 0;
        top: 0;
        left: 0;
      `;
      document.body.appendChild(measureDiv);

      textElements.forEach(el => {
        measureDiv.innerHTML = el.innerHTML;
        
        let low = minFontSize;
        let high = maxFontSize;
        let bestFit = minFontSize;

        while (low <= high) {
          const mid = Math.floor((low + high) / 2);
          measureDiv.style.fontSize = mid + 'px';
          
          if (measureDiv.offsetHeight <= availableHeight) {
            bestFit = mid;
            low = mid + 1;
          } else {
            high = mid - 1;
          }
        }
        
        el.style.fontSize = bestFit + 'px';
        el.style.width = availableWidth + 'px';
        el.style.padding = MARGIN + 'px';
      });

      document.body.removeChild(measureDiv);
    }

    window.addEventListener('resize', fitText);

    function renderDots() {
      dotsContainer.innerHTML = slides.map((_, i) => 
        `<div class="dot ${i === currentIndex ? 'active' : ''}" onclick="goToSlide(${i})"></div>`
      ).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatContent(text) {
      const div = document.createElement('div');
      div.textContent = text;
      let escaped = div.innerHTML;
      // Convert newlines to <br>
      escaped = escaped.replace(/\n/g, '<br>');
      return escaped;
    }

    function updateTimer() {
      timerDisplay.textContent = `${countdown}s`;
    }

    function startTimer() {
      if (intervalId) clearInterval(intervalId);
      countdown = SLIDE_DURATION;
      updateTimer();
      
      intervalId = setInterval(() => {
        countdown--;
        updateTimer();
        
        if (countdown <= 0) {
          next();
        }
      }, 1000);
    }

    function showSlide(index) {
      if (slides.length === 0) return;
      currentIndex = (index + slides.length) % slides.length;
      
      document.querySelectorAll('.slide').forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
      });
      
      document.querySelectorAll('.dot').forEach((el, i) => {
        el.classList.toggle('active', i === currentIndex);
      });
      
      countdown = SLIDE_DURATION;
      updateTimer();
    }

    function goToSlide(index) {
      showSlide(index);
    }

    function next() {
      showSlide(currentIndex + 1);
    }

    function prev() {
      showSlide(currentIndex - 1);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') next();
      if (e.key === 'ArrowLeft') prev();
    });

    loadSlides();
  </script>
</body>
</html>
